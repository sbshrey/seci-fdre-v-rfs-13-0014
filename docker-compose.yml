services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seci-fdre-v-web
    ports:
      - "${SECI_FDRE_V_PORT:-5000}:5000"
    environment:
      SECI_FDRE_V_WORKSPACE: /workspace
      SECI_FDRE_V_SOURCE_CONFIG: /app/config/project.yaml
    volumes:
      - type: bind
        source: ./.workspace
        target: /workspace
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
